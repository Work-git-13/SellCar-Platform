services:
  app:
    build: .
    restart: always
    volumes:
      - ./database:/app/database
    ports:
      - "80:8000"

  adminer:
    image: adminer:latest
    restart: always
    ports:
      - "8081:8080"
    volumes:
      - ./database:/var/www/html/db_files
volumes:
  db_data: